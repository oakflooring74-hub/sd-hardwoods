<style id="sdh-darkmode-css" type="text/css">
:root{
  --canvas:#f8f4ec; --canvas-alt:#f1e9da; --ink:#2a2118; --ink-soft:#5c4f42;
  --walnut:#4b2e06; --brass:#b8863f; --brass-soft:#caa56a; --brass-deep:#8c6420;
  --cta-red:#b3261e; --cta-red-dark:#8f1d17; --line:#e4d9c4; --card-bg:#ffffff;
  --util-bg:#33200a; --util-ink:#eadfc7;
  --nav-bg:#4b2e06; --nav-ink:#efe3cb; --nav-ink-strong:#ffffff; --nav-hover:rgba(255,255,255,.08); --nav-line:#3a2404;
  --font-serif:'Palatino Linotype','Book Antiqua',Palatino,Cambria,Georgia,serif;
  --font-sans:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
}
body.darkmode{
  --canvas:#1b1712; --canvas-alt:#221d16; --ink:#f2ece0; --ink-soft:#cdbfa8;
  --walnut:#d9b374; --brass:#d9b374; --brass-soft:#e7c98d; --brass-deep:#d9b374;
  --cta-red:#ff5147; --cta-red-dark:#ff8078; --line:#3a2f22; --card-bg:#241f18;
  --util-bg:#0d0a06; --util-ink:#cbb98d;
  --nav-bg:#14100a; --nav-ink:#d9c49a; --nav-ink-strong:#f6ecd8; --nav-hover:rgba(217,179,116,.1); --nav-line:#2c2214;
}
#sdh-toggle{
  position:fixed; right:16px; bottom:16px; z-index:99999;
  font:600 13px/1.2 var(--font-sans); padding:12px 16px; min-height:44px; border-radius:10px;
  border:1px solid var(--line); background:var(--card-bg); color:var(--ink);
  cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.18);
  display:flex; align-items:center; justify-content:center;
  transition:opacity .25s ease;
}
</style>
<style id="sdh-site-css" type="text/css">
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--canvas);color:var(--ink);font-family:var(--font-sans);margin:0;}
a{color:inherit;}
[id]{scroll-margin-top:84px;}
.sdh-wrap{max-width:1180px;margin:0 auto;padding:0 24px;}

.btn{display:inline-block;font-weight:700;text-decoration:none;padding:14px 28px;border-radius:8px;font-size:17px;font-family:var(--font-sans);transition:transform .15s ease, box-shadow .15s ease;}
.btn:hover{transform:translateY(-1px);}
.btn-call{background:var(--cta-red);color:#fff !important;box-shadow:0 6px 18px rgba(179,38,30,.35);}
.btn-outline{background:transparent;color:var(--walnut) !important;border:2px solid var(--walnut);}
body.darkmode .btn-outline{color:var(--brass) !important;border-color:var(--brass);}
.btn-yt{display:inline-flex;align-items:center;gap:10px;padding:11px 20px;min-height:44px;border:1px solid var(--line);border-radius:26px;background:var(--card-bg);color:var(--ink);font-family:var(--font-sans);font-weight:700;font-size:14.5px;text-decoration:none;box-shadow:0 3px 12px rgba(20,12,3,.08);transition:border-color .15s ease, transform .15s ease;}
.btn-yt:hover{border-color:var(--brass);transform:translateY(-1px);}
.btn-yt .yt-ico{display:inline-flex;align-items:center;}

.eyebrow{font-family:var(--font-sans);font-size:12px;font-weight:700;letter-spacing:2.4px;text-transform:uppercase;color:var(--brass-deep);text-align:center;margin:0 0 10px;}

.hero{text-align:center;padding:52px 24px 40px;}
.hero .kicker{font-family:var(--font-serif);font-style:italic;color:var(--brass-deep);font-size:19px;letter-spacing:1.2px;margin-bottom:10px;}
.hero h1{font-family:var(--font-serif);font-size:40px;line-height:1.16;margin:0 0 18px;color:var(--ink);letter-spacing:.2px;}
.hero p{font-size:18px;line-height:1.65;color:var(--ink-soft);max-width:820px;margin:0 auto 16px;}
.hero .cta-row{margin-top:24px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}

/* homepage hero: brand-led copy + controlled-proportion video, side by side on desktop */
.hero-home{max-width:1180px;margin:0 auto;padding:44px 24px 26px;text-align:left;}
.hero-grid{display:grid;grid-template-columns:minmax(0,1.06fr) minmax(0,.94fr);gap:44px;align-items:center;}
.hero-home .kicker{margin-bottom:8px;}
.hero-home h1{font-size:37px;}
.hero-home p{margin:0 0 14px;max-width:none;font-size:17.5px;}
.hero-home .cta-row{justify-content:flex-start;margin-top:20px;}
.hero-note{font-size:14px;color:var(--ink-soft);opacity:.9;margin-top:14px !important;}
.hero-media{min-width:0;}
.hero-media .video-frame{margin:0;}
.hero-media-foot{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-top:14px;}
.hero-media-caption{font-size:14px;color:var(--ink-soft);line-height:1.5;margin:0;}
.hero-media-caption strong{color:var(--cta-red);}
@media(max-width:920px){
  .hero-grid{grid-template-columns:1fr;gap:28px;}
  .hero-home{padding:30px 20px 20px;}
  .hero-home h1{font-size:29px;}
  .hero-home .cta-row .btn{width:100%;text-align:center;}
}

section.block{padding:44px 24px;max-width:1180px;margin:0 auto;}
section.block h1{font-family:var(--font-serif);font-size:36px;color:var(--ink);text-align:center;margin:0 0 10px;letter-spacing:.2px;}
section.block h2{font-family:var(--font-serif);font-size:31px;color:var(--ink);text-align:center;margin:0 0 10px;letter-spacing:.2px;line-height:1.25;}
section.block h3{font-family:var(--font-serif);font-size:24px;color:var(--ink);}
section.block .lede{text-align:center;color:var(--ink-soft);font-size:18px;max-width:760px;margin:0 auto 30px;line-height:1.65;}

.card{background:var(--card-bg);border:1px solid var(--line);border-radius:12px;padding:32px;box-shadow:0 6px 24px rgba(0,0,0,.06);}
.cta-card{display:flex;gap:32px;align-items:center;flex-wrap:wrap;}
.cta-card .cta-copy{flex:1 1 480px;}
.cta-card h3{font-family:var(--font-serif);font-size:26px;margin:0 0 12px;}
.cta-card p{font-size:17px;line-height:1.6;color:var(--ink-soft);}
.cta-card .cta-media{flex:0 0 220px;text-align:center;}
.cta-card .cta-media img{width:100%;max-width:220px;border-radius:10px;}

.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;margin-top:8px;}
.info-grid .card h3{font-family:var(--font-serif);font-size:22px;margin:0 0 10px;color:var(--walnut);}
body.darkmode .info-grid .card h3{color:var(--brass);}
.info-grid .card p{color:var(--ink-soft);font-size:16px;line-height:1.6;margin:0 0 8px;}
.info-grid ul{margin:0;padding-left:20px;color:var(--ink-soft);font-size:16px;line-height:1.8;}

.video-frame{max-width:960px;margin:0 auto;border-radius:12px;overflow:hidden;border:1px solid var(--line);box-shadow:0 10px 30px rgba(0,0,0,.12);background:#0e0b07;}
.video-frame iframe, .video-frame video{width:100%;display:block;}
#heroVideoMount{position:relative;height:0;padding-top:56.25%;overflow:hidden;}
.video-cta{text-align:center;margin-top:22px;}
.video-cta p{font-size:17px;color:var(--ink-soft);margin:0 0 14px;}

/* Bona Certified Craftsman credential band */
.bona-band{display:flex;align-items:center;gap:34px;flex-wrap:wrap;border-top:3px solid var(--brass);}
.bona-band .bona-seal{flex:0 0 148px;text-align:center;}
.bona-band .bona-seal img{width:100%;max-width:148px;height:auto;display:block;margin:0 auto;}
body.darkmode .bona-band .bona-seal img{background:#f4f1ea;border-radius:50%;padding:6px;}
.bona-band .bona-copy{flex:1 1 420px;}
.bona-band h2{text-align:left;margin:0 0 10px;}
.bona-band p{font-size:16.5px;line-height:1.65;color:var(--ink-soft);margin:0 0 10px;}
.bona-band .bona-verify{font-size:14.5px;font-weight:700;color:var(--brass-deep);text-decoration:underline;}
@media(max-width:640px){.bona-band{flex-direction:column;text-align:center;}.bona-band h2{text-align:center;}.bona-band .bona-seal{flex-basis:auto;}}

/* Professional consultation tiers */
.consult-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(320px,100%),1fr));gap:22px;margin-top:26px;}
.consult-card{background:var(--card-bg);border:1px solid var(--line);border-radius:12px;padding:26px;display:flex;flex-direction:column;box-shadow:0 6px 24px rgba(0,0,0,.06);}
.consult-card.consult-free{grid-column:1/-1;border:2px solid var(--brass);background:linear-gradient(0deg,var(--card-bg),var(--card-bg));}
.consult-head{display:flex;align-items:baseline;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:10px;}
.consult-card h3{font-family:var(--font-serif);font-size:21px;line-height:1.3;margin:0;color:var(--ink);}
.consult-price{font-family:var(--font-serif);font-size:24px;font-weight:700;color:var(--brass-deep);white-space:nowrap;}
.consult-card p{font-size:15.5px;line-height:1.62;color:var(--ink-soft);margin:0 0 10px;}
.consult-card ul{margin:0 0 10px;padding-left:20px;color:var(--ink-soft);font-size:15px;line-height:1.7;}
.consult-fine{font-size:12.5px;line-height:1.5;color:var(--ink-soft);opacity:.8;font-style:italic;margin-top:auto;}
.consult-note{text-align:center;font-size:14.5px;color:var(--ink-soft);max-width:720px;margin:22px auto 0;line-height:1.6;}

/* homepage bottom gallery navigation */
.gallery-nav{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(230px,100%),1fr));gap:16px;margin-top:26px;}
.gnav-tile{display:flex;flex-direction:column;gap:6px;background:var(--card-bg);border:1px solid var(--line);border-radius:12px;padding:20px 22px;text-decoration:none;box-shadow:0 6px 24px rgba(0,0,0,.06);transition:transform .15s ease, border-color .15s ease;}
.gnav-tile:hover{transform:translateY(-2px);border-color:var(--brass);}
.gnav-tile .gnav-kicker{font-size:11.5px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--brass-deep);}
.gnav-tile .gnav-title{font-family:var(--font-serif);font-size:19px;font-weight:700;color:var(--ink);line-height:1.3;}
.gnav-tile .gnav-sub{font-size:13.5px;color:var(--ink-soft);line-height:1.5;}
.gnav-tile .gnav-go{margin-top:auto;padding-top:8px;font-size:14px;font-weight:700;color:var(--brass-deep);}
.gnav-links{text-align:center;margin-top:22px;font-size:15px;color:var(--ink-soft);}
.gnav-links a{color:var(--brass-deep);font-weight:700;text-decoration:underline;}
.gnav-links .gl-sep{opacity:.45;margin:0 10px;}

.gallery-intro{text-align:center;margin-bottom:26px;}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.gallery figure{position:relative;margin:0;border-radius:10px;overflow:hidden;background:var(--card-bg);border:1px solid var(--line);}
.gallery figure a{display:block;background:var(--canvas-alt);}
.gallery img{width:100%;height:420px;object-fit:contain;background:var(--canvas-alt);display:block;transition:transform .35s ease;}
.gallery figure:hover img{transform:scale(1.05);}
.gallery figcaption{padding:10px 12px;font-size:13px;color:var(--ink-soft);line-height:1.4;}
.gallery-badge{position:absolute;top:8px;left:8px;background:var(--walnut);color:#fff;font-weight:700;font-size:13px;line-height:1;padding:6px 10px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:2;pointer-events:none;}
body.darkmode .gallery-badge{background:var(--brass);color:#1b1712;}

.gallery-progress{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;margin:0 0 28px;padding:14px 20px;background:var(--card-bg);border:1px solid var(--line);border-radius:12px;}
.gallery-progress .gp-dots{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.gallery-progress .gp-dots a{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--canvas-alt);color:var(--ink-soft);font-weight:700;font-size:14px;text-decoration:none;border:1px solid var(--line);}
.gallery-progress .gp-dots a.active{background:var(--walnut);color:#fff;border-color:var(--walnut);}
body.darkmode .gallery-progress .gp-dots a.active{background:var(--brass);color:#1b1712;}
.gallery-progress .gp-label{font-weight:700;color:var(--ink);font-size:14px;white-space:nowrap;}
.gallery-progress a.gp-prev, .gallery-progress a.gp-next{font-weight:700;color:var(--walnut);text-decoration:none;font-size:14px;padding:10px 4px;min-height:44px;display:flex;align-items:center;}
.gallery-progress .gp-disabled{color:var(--ink-soft);opacity:.4;font-weight:700;font-size:14px;padding:10px 4px;min-height:44px;display:flex;align-items:center;}
body.darkmode .gallery-progress a.gp-prev, body.darkmode .gallery-progress a.gp-next{color:var(--brass);}
@media(max-width:640px){.gallery-progress{gap:10px;padding:12px;} .gallery-progress .gp-dots a{width:30px;height:30px;font-size:13px;}}

.service-list{columns:2;column-gap:50px;padding-left:20px;font-size:16px;line-height:1.9;color:var(--ink-soft);}
@media(max-width:640px){.service-list{columns:1;}}

.blog-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;}
.blog-list .card h3{font-family:var(--font-serif);font-size:21px;margin:0 0 10px;}
.blog-list .card img{width:100%;height:190px;object-fit:cover;border-radius:8px;margin-bottom:14px;}

footer.sdh-footer{background:var(--canvas-alt);border-top:1px solid var(--line);padding:48px 24px 28px;text-align:center;margin-top:40px;}
footer.sdh-footer .f-name{font-family:var(--font-serif);font-size:26px;font-weight:700;color:var(--ink);}
footer.sdh-footer p{color:var(--ink-soft);font-size:15px;max-width:760px;margin:8px auto;line-height:1.6;}
footer.sdh-footer .f-call{font-size:22px;font-weight:700;margin:16px 0;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:6px 14px;max-width:100%;}
footer.sdh-footer .f-call a{color:var(--cta-red);text-decoration:none;word-break:break-word;overflow-wrap:anywhere;}
footer.sdh-footer .f-call .f-call-sep{opacity:.5;}
footer.sdh-footer .f-links a{color:var(--walnut);text-decoration:underline;font-weight:600;}
body.darkmode footer.sdh-footer .f-links a{color:var(--brass);}
footer.sdh-footer .copyright{font-size:13px;opacity:.6;margin-top:22px;}

@media(max-width:760px){
  .hero h1{font-size:30px;}
  section.block h1{font-size:28px;}
  section.block h2{font-size:26px;}
  .gallery img{height:240px;}
}

@media (prefers-reduced-motion: reduce){
  html{scroll-behavior:auto;}
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;}
}
</style>
