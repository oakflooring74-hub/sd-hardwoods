<!-- SDH explore bar (Milestone 2.1 redesign): a refined translucent bar that invites
     visitors to the site's real project destinations. Behavior contract:
     - NEVER visible over the initial hero: it appears only after the visitor has
       scrolled far enough that the hero (and its CTA buttons) is fully above the
       bar's own strip of the viewport, and it hides again while the footer is on
       screen so it never sits on top of footer links.
     - Fixed near the bottom center once shown; respects mobile safe areas.
     - Dismissable (persists for the browser session via sessionStorage).
     - Rotating destination messages pause on hover and keyboard focus.
     - prefers-reduced-motion: no glow pulse, no float, no message rotation.
     The old floating "Toggle Light Mode" button that lived in this partial was removed;
     theme control now lives in the menu drawer (see top.html + darkmode_boot_scripts.html). -->
<style>
#sdhExplore{position:fixed;left:50%;bottom:calc(16px + env(safe-area-inset-bottom,0px));z-index:999899;display:flex;align-items:center;gap:12px;width:min(680px,94vw);padding:9px 10px 9px 18px;border-radius:18px;color:#dbe7f3;background:rgba(15,21,31,.82);-webkit-backdrop-filter:blur(10px) saturate(1.15);backdrop-filter:blur(10px) saturate(1.15);border:1px solid rgba(108,176,230,.5);box-shadow:0 0 0 1px rgba(56,120,180,.14),0 12px 32px rgba(4,9,17,.5),0 0 16px rgba(72,142,205,.2);opacity:0;visibility:hidden;transform:translate(-50%,16px);pointer-events:none;transition:opacity .35s ease,transform .35s ease,visibility .35s;}
#sdhExplore.show{opacity:1;visibility:visible;transform:translate(-50%,0);pointer-events:auto;animation:sdhExplorePulse 7s ease-in-out infinite,sdhExploreFloat 9s ease-in-out infinite;}
#sdhExplore:hover,#sdhExplore:focus-within{animation-play-state:paused,paused;}
@keyframes sdhExplorePulse{
  0%,100%{box-shadow:0 0 0 1px rgba(56,120,180,.14),0 12px 32px rgba(4,9,17,.5),0 0 16px rgba(72,142,205,.2);border-color:rgba(108,176,230,.5);}
  50%{box-shadow:0 0 0 1px rgba(76,150,210,.24),0 12px 32px rgba(4,9,17,.5),0 0 26px rgba(92,168,235,.38);border-color:rgba(132,196,245,.72);}
}
@keyframes sdhExploreFloat{0%,100%{transform:translate(-50%,0);}50%{transform:translate(-50%,-3px);}}
#sdhExplore .xp-eyebrow{flex:0 0 auto;font:700 10.5px/1.3 var(--font-sans);letter-spacing:2.1px;text-transform:uppercase;color:#8fc4ee;padding-right:14px;border-right:1px solid rgba(120,180,230,.3);}
#sdhExplore .xp-link{flex:1 1 auto;display:flex;align-items:center;justify-content:center;gap:9px;min-height:44px;padding:4px 6px;font-family:var(--font-serif);font-size:15.5px;line-height:1.35;color:#f0f6fc;text-decoration:none;text-align:center;border-radius:10px;}
#sdhExplore .xp-link:hover{color:#aed7f8;}
#sdhExplore .xp-link:focus-visible,#sdhExplore .xp-close:focus-visible{outline:2px solid #8fc9f6;outline-offset:2px;}
#sdhExplore .xp-link .xp-arrow{font-size:13px;color:#8fc4ee;flex:0 0 auto;}
#sdhExplore .xp-text{transition:opacity .2s ease;}
#sdhExplore .xp-close{flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:44px;height:44px;border:none;background:none;color:#b7c9da;font-size:15px;cursor:pointer;opacity:.75;border-radius:12px;}
#sdhExplore .xp-close:hover{opacity:1;background:rgba(255,255,255,.09);color:#fff;}
@media(max-width:560px){#sdhExplore .xp-eyebrow{display:none;}#sdhExplore{padding-left:10px;gap:6px;}#sdhExplore .xp-link{font-size:13.5px;}}
@media (prefers-reduced-motion: reduce){
  #sdhExplore,#sdhExplore.show{transition:none;animation:none;}
  #sdhExplore .xp-text{transition:none;}
}
</style>
<div id="sdhExplore" role="complementary" aria-label="Explore real San Diego Hardwoods projects">
  <span class="xp-eyebrow" aria-hidden="true">Explore Real Projects</span>
  <a class="xp-link" id="sdhExploreLink" href="https://www.sdhardwoods.com/recent_project_photo_gallery_1.html"><span class="xp-arrow" aria-hidden="true">&rarr;</span><span class="xp-text" id="sdhExploreText">See Before-and-After Hardwood Floor Transformations</span></a>
  <button type="button" class="xp-close" aria-label="Dismiss explore bar">&#10005;</button>
</div>
<script>
(function(){
  var bar = document.getElementById("sdhExplore");
  if (!bar) return;
  try { if (sessionStorage.getItem("sdhScrollClosed")) { bar.remove(); return; } } catch(e){}

  var reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var link = document.getElementById("sdhExploreLink");
  var txt = document.getElementById("sdhExploreText");

  /* Real, useful site destinations -- every message is a working link. */
  var messages = [
    { text: "See Before-and-After Hardwood Floor Transformations", href: "https://www.sdhardwoods.com/recent_project_photo_gallery_1.html" },
    { text: "Watch Dust-Contained Refinishing on Real Projects", href: "https://www.sdhardwoods.com/videos_of_refinishing_process.html" },
    { text: "Repairs and Restoration — Real Project Results", href: "https://www.sdhardwoods.com/recent_project_photo_gallery_4.html" },
    { text: "Deep Cleaning and Recoating — When Sanding Isn’t Needed", href: "https://www.sdhardwoods.com/deep-cleaning-hardwood-floors-san-diego.html" },
    { text: "Solid Hardwood Installation Projects", href: "https://www.sdhardwoods.com/solid_wood_floor_photo_gallery.html" },
    { text: "Browse Five Detailed Project Galleries", href: "https://www.sdhardwoods.com/recent_project_photo_gallery_2.html" },
    { text: "Watch Our Refinishing Videos", href: "https://www.sdhardwoods.com/videos_of_refinishing_process.html" }
  ];
  var i = 0, paused = false, timer = null;

  function apply(idx){
    var m = messages[idx];
    txt.textContent = m.text;
    link.setAttribute("href", m.href);
  }
  apply(0);

  function rotate(){
    if (paused || document.hidden || !bar.classList.contains("show")) return;
    i = (i + 1) % messages.length;
    txt.style.opacity = 0;
    setTimeout(function(){ apply(i); txt.style.opacity = 1; }, 200);
  }
  if (!reduceMotion) {
    timer = setInterval(rotate, 6000);
    bar.addEventListener("mouseenter", function(){ paused = true; });
    bar.addEventListener("mouseleave", function(){ paused = false; });
    bar.addEventListener("focusin", function(){ paused = true; });
    bar.addEventListener("focusout", function(){ paused = false; });
  }

  /* Visibility: shown only once the hero (and its CTA buttons) sits fully above the
     bar's strip of the viewport, and hidden again while the footer is on screen. */
  var hero = document.querySelector(".hero");
  var footerVisible = false;
  var CLEARANCE = 130; /* px of viewport bottom the bar occupies, incl. margin */

  function heroCleared(){
    if (!hero) return true;
    var r = hero.getBoundingClientRect();
    return r.bottom < window.innerHeight - CLEARANCE;
  }
  function update(){
    /* require real scrolling too, so the bar never appears on initial load even on
       pages whose hero is short enough to clear the bar's strip at scroll 0 */
    bar.classList.toggle("show", window.scrollY > 250 && heroCleared() && !footerVisible);
  }
  window.addEventListener("scroll", update, { passive: true });
  window.addEventListener("resize", update, { passive: true });
  update();

  var footer = document.querySelector("footer.sdh-footer");
  if (footer && "IntersectionObserver" in window) {
    new IntersectionObserver(function(entries){
      footerVisible = entries[0].isIntersecting;
      update();
    }, { threshold: 0 }).observe(footer);
  }

  bar.querySelector(".xp-close").addEventListener("click", function(){
    bar.remove();
    if (timer) clearInterval(timer);
    try { sessionStorage.setItem("sdhScrollClosed", "1"); } catch(e){}
  });
})();
</script>
