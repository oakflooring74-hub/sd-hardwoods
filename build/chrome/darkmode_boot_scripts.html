<script id="sdh-darkmode-boot">
(function(){
  /* Milestone 2.3: dark is the site default. A stored explicit choice (made via the
     theme control) always wins; with no stored choice the site opens dark regardless
     of the OS color-scheme preference. The html-level class is applied synchronously,
     before first paint, so the dark canvas variables (html.sdh-dark in site_css) take
     effect immediately and there is no light-mode flash; the body class that the rest
     of the dark styling keys off is added as soon as the body exists. */
  var pref = null;
  try { pref = localStorage.getItem('sdh-theme'); } catch(e){}
  if (pref !== 'light') {
    document.documentElement.classList.add('sdh-dark');
    document.addEventListener('DOMContentLoaded', function(){ document.body.classList.add('darkmode'); });
  }
})();
</script>
<script id="sdh-darkmode-logic">
(function() {
  document.addEventListener('DOMContentLoaded', function() {
    var btns = Array.prototype.slice.call(document.querySelectorAll('.sdh-theme-btn'));
    if (!btns.length) return;

    function sync() {
      var isDark = document.body.classList.contains('darkmode');
      btns.forEach(function(btn){
        var label = btn.querySelector('.theme-label');
        var ico = btn.querySelector('.theme-ico');
        if (label) label.textContent = isDark ? 'Use Light Appearance' : 'Use Dark Appearance';
        if (ico) ico.innerHTML = isDark ? '&#9788;' : '&#9790;';
        btn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
      });
    }
    btns.forEach(function(btn){
      btn.addEventListener('click', function() {
        document.body.classList.toggle('darkmode');
        var isDark = document.body.classList.contains('darkmode');
        document.documentElement.classList.toggle('sdh-dark', isDark);
        try { localStorage.setItem('sdh-theme', isDark ? 'dark' : 'light'); } catch(e){}
        sync();
      });
    });
    sync();
  });
})();
</script>
