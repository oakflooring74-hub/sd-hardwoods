name: Build and Deploy (Cloudflare Workers)

# redesign pushes deploy automatically to the sd-hardwoods-preview Worker
# (Workers Static Assets); pull requests only build+verify (never deploy);
# workflow_dispatch allows a controlled manual rerun against whatever
# branch/ref is selected in the Actions UI.
#
# DEPLOYMENT ARCHITECTURE (2026-07-24): the site deploys to Cloudflare
# Workers Static Assets (wrangler.jsonc, html_handling "none"), NOT Cloudflare
# Pages. Pages force-308s every .html URL to its extensionless form, which
# contradicts the site's .html canonical strategy; Workers with
# html_handling "none" serves every .html URL as a direct 200 and _redirects
# 301s the extensionless/trailing-slash duplicates to the .html canonicals.
# The old sd-hardwoods Pages project is dormant and kept as a rollback
# target only -- do not resume deploying to it: the _redirects file now in
# this repo combines with Pages' own .html normalization to produce a
# redirect loop on any Pages deployment of this content.
#
# Production (master -> custom domain www.sdhardwoods.com) is intentionally
# NOT configured yet; the production-guard job below fails master pushes
# loudly until the production cutover sets up the production Worker.
on:
  push:
    branches:
      - redesign
      - master
  pull_request:
    branches:
      - redesign
      - master
  workflow_dispatch: {}

# One in-flight deployment per branch at a time. Queue (don't cancel) so an
# in-progress Cloudflare Pages deploy is never interrupted mid-upload.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build and verify generated output
    # The build/ scripts join paths with hardcoded backslashes (Windows-only), so
    # this job runs on windows-latest rather than rewriting the existing, already
    # reviewed generator scripts just to satisfy CI.
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      # Windows runners default to core.autocrlf=true, which would rewrite LF to
      # CRLF on checkout and make every text file look "modified" to git status
      # even with no real content change. Disable that before checking out.
      - name: Disable Windows line-ending rewriting
        run: git config --global core.autocrlf false

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Run build pipeline
        run: python build/scripts/build_all.py

      # The repo-root .html files are committed, generated output -- build/ is the
      # generator. If regenerating produces a diff, the committed pages are stale
      # relative to build/chrome + build/scripts + build/data, and must not be
      # deployed as-is. Fail loudly instead of deploying a mismatched site.
      - name: Fail if build changed committed output
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Regenerating the site (python build/scripts/build_all.py) produced uncommitted differences. Generated HTML is out of sync with build/ source templates -- run the build locally, review the diff, and commit the regenerated pages before this will pass."
            git status --porcelain
            git diff --stat
            exit 1
          fi
          echo "Generated output matches committed output -- safe to deploy."

  deploy:
    name: Deploy redesign preview to Cloudflare Workers
    needs: build
    # Pull requests only ever run the build/verify job above -- never deploy.
    # Only redesign is deployable from this workflow; master is blocked by the
    # production-guard job below until the production Worker is configured at
    # cutover.
    if: github.event_name != 'pull_request' && github.ref_name == 'redesign'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Deploys the committed repo root (assets directory "." in wrangler.jsonc,
      # filtered by .assetsignore) to the sd-hardwoods-preview Worker at
      # https://sd-hardwoods-preview.sandiegohardwoods.workers.dev. The _headers
      # file pins X-Robots-Tag noindex to exactly that hostname, so the preview
      # can never be indexed and the rule can never leak onto the production
      # domain.
      - name: Deploy to Cloudflare Workers Static Assets
        id: deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Summarize deployment
        run: |
          {
            echo "### Cloudflare Workers deployment (redesign preview)"
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Worker: sd-hardwoods-preview"
            echo "- Deployment URL: ${{ steps.deploy.outputs.deployment-url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  production-guard:
    name: Block master deploys until Workers production cutover
    needs: build
    if: github.event_name != 'pull_request' && github.ref_name == 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Fail with cutover instructions
        run: |
          echo "::error::The Workers production deployment (master -> www.sdhardwoods.com) is not configured yet. Deploying master to the preview Worker or to the dormant Pages project would be wrong. Complete the production cutover first: add a production Worker configuration (separate name/env in wrangler.jsonc), attach the custom domain, then replace this guard job with the production deploy step."
          exit 1
